<h2><i class="bi bi-laptop text-primary me-2"></i>
  {{ section.title }}</h2>
{% for item in section.items %}
<div class="card mb-3 border-0 bg-light">
  <div class="card-body">
    <h5 class="card-title">{{ item.role }}</h5>
    <h6 class="card-subtitle text-muted">
      {{ item.company }} &mdash; {{ item.period }}
    </h6>
    <p class="card-text mt-2">{{ item.description }}</p>
    {% for tech in item.tech %}
    <span class="badge bg-info text-dark me-1">{{ tech }}</span>
    {% endfor %}
  </div>
</div>
{% empty %}
<p class="text-muted">Sin experiencia registrada.</p>
{% endfor %}
