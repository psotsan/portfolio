<div class="text-center">
  <h1 class="display-4 fw-bold">{{ section.greeting }}
    <span class="text-primary">{{ PERSONAL_NAME }}</span>
  </h1>
  <h3 class="text-muted">{{ section.role }}</h3>
  <p class="lead mt-3">{{ section.description }}</p>
  <div class="mt-4">
    <a href="{{ PERSONAL_GITHUB }}"
       class="btn btn-dark me-2">
      <i class="bi bi-github me-1"></i>GitHub
    </a>
    <a href="{{ PERSONAL_LINKEDIN }}"
       class="btn btn-primary me-2">
      <i class="bi bi-linkedin me-1"></i>LinkedIn
    </a>
    <a href="mailto:{{ PERSONAL_EMAIL }}"
       class="btn btn-outline-secondary">
      <i class="bi bi-envelope me-1"></i>Email
    </a>
  </div>
</div>
